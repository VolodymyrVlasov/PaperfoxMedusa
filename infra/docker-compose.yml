services:
  # ---------- БД ----------
  postgres:
    image: postgres:16
    container_name: pxf-postgres
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: pxf-redis
    restart: unless-stopped
    command: ["redis-server","--appendonly","yes","--requirepass","${REDIS_PASSWORD}"]
    env_file: ../.env
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Medusa backend ----------
  backend:
    build:
      context: ../backend      
    container_name: pxf-backend
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      - postgres
      - redis
    expose:
      - "9000"

  # ---------- Nginx + статичний фронт ----------
  web:
    build:
      context: ../frontend
    container_name: pxf-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  redisdata:
